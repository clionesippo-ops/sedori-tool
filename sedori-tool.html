<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>せどり管理ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #00ff88;
    --accent2: #00cc6a;
    --text: #f0f0f0;
    --text2: #888;
    --error: #ff4466;
    --warning: #ffaa00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding: 20px 16px 40px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .logo span {
    display: block;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  /* 設定パネル */
  .config-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .config-panel h3 {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 16px;
    font-family: 'Space Mono', monospace;
  }

  .field {
    margin-bottom: 14px;
  }

  .field label {
    display: block;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }

  .field input, .field select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus, .field select:focus {
    border-color: var(--accent);
  }

  .field input::placeholder {
    color: var(--text2);
    font-size: 12px;
  }

  /* 写真エリア */
  .upload-area {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 20px;
    position: relative;
  }

  .upload-area:hover, .upload-area.drag-over {
    border-color: var(--accent);
    background: rgba(0, 255, 136, 0.03);
  }

  .upload-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  .upload-icon {
    font-size: 40px;
    margin-bottom: 12px;
  }

  .upload-area h2 {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .upload-area p {
    font-size: 12px;
    color: var(--text2);
  }

  /* プレビュー */
  .preview-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  .preview-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .preview-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .preview-item .remove-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    background: rgba(0,0,0,0.7);
    border: none;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    color: white;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ボタン */
  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    margin-bottom: 12px;
  }

  .btn-primary:hover {
    background: var(--accent2);
    transform: translateY(-1px);
  }

  .btn-primary:disabled {
    background: var(--border);
    color: var(--text2);
    cursor: not-allowed;
    transform: none;
  }

  .btn-secondary {
    width: 100%;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 12px;
  }

  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ローディング */
  .loading {
    display: none;
    text-align: center;
    padding: 24px;
    background: var(--surface);
    border-radius: 12px;
    margin-bottom: 20px;
  }

  .loading.active { display: block; }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading p {
    font-size: 13px;
    color: var(--text2);
  }

  /* 結果パネル */
  .result-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .result-panel.active { display: block; }

  .result-panel h3 {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    font-family: 'Space Mono', monospace;
  }

  .result-item {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    align-items: flex-start;
  }

  .result-item label {
    font-size: 11px;
    color: var(--text2);
    min-width: 70px;
    padding-top: 10px;
    letter-spacing: 0.05em;
  }

  .result-item input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .result-item input:focus {
    border-color: var(--accent);
  }

  /* トースト */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: #000;
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 700;
    transition: transform 0.3s ease;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.error {
    background: var(--error);
    color: white;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* Google認証 */
  .auth-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
  }

  .auth-section p {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 16px;
  }

  .auth-status {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 13px;
  }

  .auth-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
  }

  .auth-dot.connected { background: var(--accent); }

  .tag {
    display: inline-block;
    background: rgba(0, 255, 136, 0.1);
    color: var(--accent);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    margin-left: 8px;
  }

  .history {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .history h3 {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 14px;
    font-family: 'Space Mono', monospace;
  }

  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }

  .history-item:last-child { border-bottom: none; }

  .history-item .name { color: var(--text); flex: 1; }
  .history-item .time { color: var(--text2); font-family: 'Space Mono', monospace; font-size: 10px; }
  .history-item .status { color: var(--accent); margin-left: 8px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    MISAKI SEDORI
    <span>商品管理ツール</span>
  </div>
</header>

<!-- API設定 -->
<div class="config-panel" id="configPanel">
  <h3>⚙ 設定</h3>
  <div class="field">
    <label>Anthropic APIキー</label>
    <input type="password" id="anthropicKey" placeholder="sk-ant-..." />
  </div>
  <div class="field">
    <label>Google OAuth クライアントID</label>
    <input type="text" id="googleClientId" placeholder="xxxx.apps.googleusercontent.com" />
  </div>
  <div class="field">
    <label>スプレッドシートID</label>
    <input type="text" id="sheetId" placeholder="18BFBKj1zmRWhxJ5Ywre0g7l0EDbybX_qnRzdUyRhXss" value="18BFBKj1zmRWhxJ5Ywre0g7l0EDbybX_qnRzdUyRhXss" />
  </div>
  <button class="btn-secondary" onclick="saveConfig()">設定を保存</button>
</div>

<!-- Google認証 -->
<div class="auth-section" id="authSection">
  <p>Googleスプレッドシートへの書き込み権限が必要です</p>
  <div class="auth-status" id="authStatus">
    <div class="auth-dot" id="authDot"></div>
    <span id="authText">未接続</span>
  </div>
  <br>
  <button class="btn-secondary" id="authBtn" onclick="handleAuth()" style="max-width:200px;margin:0 auto">Googleでログイン</button>
</div>

<!-- 写真アップロード -->
<div class="upload-area" id="uploadArea">
  <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)">
  <div class="upload-icon">📸</div>
  <h2>写真を選ぶ / 撮影する</h2>
  <p>複数枚OK・タップして選択</p>
</div>

<!-- プレビュー -->
<div class="preview-grid" id="previewGrid"></div>

<!-- 解析ボタン -->
<button class="btn-primary" id="analyzeBtn" onclick="analyzeImages()" disabled>
  🔍 AIで解析してスプシに追加
</button>

<!-- ローディング -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <p id="loadingText">画像を解析中...</p>
</div>

<!-- 結果 -->
<div class="result-panel" id="resultPanel">
  <h3>✓ 解析結果 <span class="tag">編集可能</span></h3>
  <div class="result-item">
    <label>商品名</label>
    <input type="text" id="r_name" />
  </div>
  <div class="result-item">
    <label>ジャンル</label>
    <input type="text" id="r_genre" />
  </div>
  <div class="result-item">
    <label>系統</label>
    <input type="text" id="r_style" />
  </div>
  <div class="result-item">
    <label>ブランド</label>
    <input type="text" id="r_brand" />
  </div>
  <div class="result-item">
    <label>出品価格</label>
    <input type="number" id="r_price" placeholder="0" />
  </div>
  <div class="result-item">
    <label>状態</label>
    <input type="text" id="r_condition" value="目立った傷や汚れなし" />
  </div>
  <br>
  <button class="btn-primary" onclick="writeToSheet()">📊 スプシに書き込む</button>
  <button class="btn-secondary" onclick="resetAll()">別の商品を追加</button>
</div>

<!-- 履歴 -->
<div class="history" id="historySection" style="display:none">
  <h3>📋 追加履歴</h3>
  <div id="historyList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== 状態管理 =====
let imageFiles = [];
let imageBase64s = [];
let accessToken = null;
let analysisResult = null;
let history = [];

// ===== 設定の保存・読み込み =====
function saveConfig() {
  const key = document.getElementById('anthropicKey').value;
  const clientId = document.getElementById('googleClientId').value;
  const sheetId = document.getElementById('sheetId').value;
  if (key) localStorage.setItem('anthropicKey', key);
  if (clientId) localStorage.setItem('googleClientId', clientId);
  if (sheetId) localStorage.setItem('sheetId', sheetId);
  showToast('設定を保存しました');
}

function loadConfig() {
  const key = localStorage.getItem('anthropicKey');
  const clientId = localStorage.getItem('googleClientId');
  const sheetId = localStorage.getItem('sheetId');
  if (key) document.getElementById('anthropicKey').value = key;
  if (clientId) document.getElementById('googleClientId').value = clientId;
  if (sheetId) document.getElementById('sheetId').value = sheetId;
}

// ===== Google OAuth =====
function handleAuth() {
  const clientId = document.getElementById('googleClientId').value || localStorage.getItem('googleClientId');
  if (!clientId) {
    showToast('クライアントIDを入力してください', true);
    return;
  }

  const redirectUri = window.location.href.split('?')[0];
  const scope = 'https://www.googleapis.com/auth/spreadsheets';
  const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=${encodeURIComponent(scope)}`;
  
  window.location.href = authUrl;
}

function checkAuthCallback() {
  const hash = window.location.hash;
  if (hash.includes('access_token')) {
    const params = new URLSearchParams(hash.substring(1));
    accessToken = params.get('access_token');
    localStorage.setItem('accessToken', accessToken);
    window.history.replaceState(null, null, window.location.pathname);
    updateAuthUI(true);
  } else {
    const stored = localStorage.getItem('accessToken');
    if (stored) {
      accessToken = stored;
      updateAuthUI(true);
    }
  }
}

function updateAuthUI(connected) {
  document.getElementById('authDot').className = 'auth-dot' + (connected ? ' connected' : '');
  document.getElementById('authText').textContent = connected ? 'Googleに接続済み' : '未接続';
  document.getElementById('authBtn').textContent = connected ? '再接続' : 'Googleでログイン';
}

// ===== ファイル処理 =====
function handleFiles(files) {
  imageFiles = Array.from(files);
  imageBase64s = [];
  const grid = document.getElementById('previewGrid');
  grid.innerHTML = '';

  imageFiles.forEach((file, i) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      imageBase64s[i] = e.target.result.split(',')[1];
      
      const item = document.createElement('div');
      item.className = 'preview-item';
      item.innerHTML = `
        <img src="${e.target.result}" />
        <button class="remove-btn" onclick="removeImage(${i})">✕</button>
      `;
      grid.appendChild(item);
    };
    reader.readAsDataURL(file);
  });

  setTimeout(() => {
    document.getElementById('analyzeBtn').disabled = imageFiles.length === 0;
  }, 500);
}

function removeImage(index) {
  imageFiles.splice(index, 1);
  imageBase64s.splice(index, 1);
  const grid = document.getElementById('previewGrid');
  grid.children[index].remove();
  document.getElementById('analyzeBtn').disabled = imageFiles.length === 0;
}

// ===== Claude APIで解析 =====
async function analyzeImages() {
  const apiKey = document.getElementById('anthropicKey').value || localStorage.getItem('anthropicKey');
  if (!apiKey) {
    showToast('APIキーを入力してください', true);
    return;
  }
  if (imageBase64s.length === 0 || imageBase64s.some(b => !b)) {
    showToast('画像の読み込みをお待ちください', true);
    return;
  }

  document.getElementById('loading').classList.add('active');
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('resultPanel').classList.remove('active');

  const content = [
    ...imageBase64s.map(b64 => ({
      type: 'image',
      source: { type: 'base64', media_type: 'image/jpeg', data: b64 }
    })),
    {
      type: 'text',
      text: `この商品画像を分析して、以下の情報をJSON形式で返してください。
必ずJSON のみを返し、説明文は不要です。

{
  "name": "メルカリで売れる商品名（40文字以内、ブランド名・色・特徴・系統を含む）",
  "genre": "ジャンル（トップス/ボトムス/アウター/ワンピース/その他）",
  "style": "系統（韓国系/古着/ストリート/きれいめ/ナチュラル/モード/カジュアル/その他）",
  "brand": "ブランド名（タグから読み取れる場合。不明な場合は空文字）",
  "condition": "目立った傷や汚れなし"
}`
    }
  ];

  try {
    const response = await fetch('https://sedori-proxy.kawauso-movie124.workers.dev/', {
  method: 'POST',
  headers: {
    'Content-Type': 'application/json',
  },
  body: JSON.stringify({
    apiKey: apiKey,
    model: 'claude-sonnet-4-20250514',
    max_tokens: 1000,
    messages: [{ role: 'user', content }]
  })
});

    const data = await response.json();
    const text = data.content[0].text;
    const clean = text.replace(/```json|```/g, '').trim();
    analysisResult = JSON.parse(clean);

    document.getElementById('r_name').value = analysisResult.name || '';
    document.getElementById('r_genre').value = analysisResult.genre || '';
    document.getElementById('r_style').value = analysisResult.style || '';
    document.getElementById('r_brand').value = analysisResult.brand || '';
    document.getElementById('r_price').value = '';
    document.getElementById('r_condition').value = analysisResult.condition || '目立った傷や汚れなし';

    document.getElementById('resultPanel').classList.add('active');
  } catch (e) {
    showToast('解析エラー: ' + e.message, true);
  } finally {
    document.getElementById('loading').classList.remove('active');
    document.getElementById('analyzeBtn').disabled = false;
  }
}

// ===== スプシに書き込み =====
async function writeToSheet() {
  if (!accessToken) {
    showToast('Googleにログインしてください', true);
    return;
  }

  const sheetId = document.getElementById('sheetId').value || localStorage.getItem('sheetId');
  if (!sheetId) {
    showToast('スプレッドシートIDを入力してください', true);
    return;
  }

  document.getElementById('loadingText').textContent = 'スプシに書き込み中...';
  document.getElementById('loading').classList.add('active');

  // 管理番号生成
  const today = new Date();
  const yyyymm = today.getFullYear().toString() + String(today.getMonth() + 1).padStart(2, '0');
  const count = history.length + 1;
  const kanriNo = `${yyyymm}-${count}`;
  const dateStr = `${today.getFullYear()}/${String(today.getMonth()+1).padStart(2,'0')}/${String(today.getDate()).padStart(2,'0')}`;

  const name = document.getElementById('r_name').value;
  const genre = document.getElementById('r_genre').value;
  const style = document.getElementById('r_style').value;
  const brand = document.getElementById('r_brand').value;
  const price = document.getElementById('r_price').value;
  const condition = document.getElementById('r_condition').value;

  // A〜O列に対応する値（空白含む）
  // A:管理番号 B:商品名 C:ジャンル D:系統 E:ブランド F:出品価格 G:商品の状態 H〜N:空 O:出品日
  const rowData = [
    kanriNo, name, genre, style, brand,
    price, condition, '', '', '', '', '', '', '',
    dateStr
  ];

  try {
    // まず最終行を取得
    const getRes = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/商品管理!A:A`,
      { headers: { Authorization: `Bearer ${accessToken}` } }
    );
    const getData = await getRes.json();
    const nextRow = (getData.values ? getData.values.length : 1) + 1;

    // 書き込み
    const writeRes = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/商品管理!A${nextRow}?valueInputOption=USER_ENTERED`,
      {
        method: 'PUT',
        headers: {
          Authorization: `Bearer ${accessToken}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ values: [rowData] })
      }
    );

    if (writeRes.ok) {
      history.unshift({ name, time: dateStr, kanriNo });
      updateHistory();
      showToast(`✓ ${kanriNo} をスプシに追加しました`);
      document.getElementById('resultPanel').classList.remove('active');
      document.getElementById('previewGrid').innerHTML = '';
      imageFiles = [];
      imageBase64s = [];
      document.getElementById('analyzeBtn').disabled = true;
    } else {
      const err = await writeRes.json();
      showToast('書き込みエラー: ' + (err.error?.message || '不明'), true);
    }
  } catch (e) {
    showToast('エラー: ' + e.message, true);
  } finally {
    document.getElementById('loading').classList.remove('active');
  }
}

// ===== 履歴 =====
function updateHistory() {
  if (history.length === 0) return;
  document.getElementById('historySection').style.display = 'block';
  const list = document.getElementById('historyList');
  list.innerHTML = history.slice(0, 5).map(h => `
    <div class="history-item">
      <span class="name">${h.name}</span>
      <span class="time">${h.time}</span>
      <span class="status">✓</span>
    </div>
  `).join('');
}

// ===== リセット =====
function resetAll() {
  document.getElementById('resultPanel').classList.remove('active');
  document.getElementById('previewGrid').innerHTML = '';
  document.getElementById('fileInput').value = '';
  imageFiles = [];
  imageBase64s = [];
  document.getElementById('analyzeBtn').disabled = true;
}

// ===== トースト =====
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '') + ' show';
  setTimeout(() => t.className = 'toast' + (isError ? ' error' : ''), 3000);
}

// ===== 初期化 =====
loadConfig();
checkAuthCallback();
</script>
