<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>せどり管理ツール</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #00ff88;
    --accent2: #00cc6a;
    --text: #f0f0f0;
    --text2: #888;
    --error: #ff4466;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    padding: 20px 16px 60px;
  }
  header { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  header h1 { font-size: 20px; font-weight: 700; }
  header p { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .card h3 { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text2); margin-bottom: 12px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 13px; outline: none; }
  .field input:focus { border-color: var(--accent); }
  .btn { width: 100%; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 10px; transition: opacity 0.2s; }
  .btn:active { opacity: 0.8; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn:disabled { background: var(--border); color: var(--text2); cursor: not-allowed; }
  .auth-status { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 12px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .dot.on { background: var(--accent); }
  .upload-area { border: 2px dashed var(--border); border-radius: 12px; padding: 28px 16px; text-align: center; cursor: pointer; position: relative; margin-bottom: 12px; transition: border-color 0.2s; }
  .upload-area.has-files { border-color: var(--accent); }
  .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-area .icon { font-size: 36px; margin-bottom: 8px; }
  .upload-area p { font-size: 14px; font-weight: 600; }
  .upload-area small { font-size: 12px; color: var(--text2); }
  .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
  .preview-item { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .preview-item img { width: 100%; height: 100%; object-fit: cover; }
  .remove-btn { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.7); border: none; border-radius: 50%; width: 20px; height: 20px; color: #fff; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .loading { display: none; text-align: center; padding: 20px; }
  .loading.active { display: block; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 13px; color: var(--text2); }
  .result { display: none; }
  .result.active { display: block; }
  .result-field { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
  .result-field label { font-size: 11px; color: var(--text2); min-width: 60px; }
  .result-field input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; color: var(--text); font-size: 13px; outline: none; }
  .result-field input:focus { border-color: var(--accent); }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px); padding: 12px 20px; border-radius: 100px; font-size: 13px; font-weight: 600; transition: transform 0.3s; z-index: 999; white-space: nowrap; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.ok { background: var(--accent); color: #000; }
  .toast.err { background: var(--error); color: #fff; }
</style>
</head>
<body>
<header>
  <h1>📦 せどり管理ツール</h1>
  <p>写真→AI解析→スプシ自動入力</p>
</header>

<div class="card" id="configCard">
  <h3>⚙ API設定</h3>
  <div class="field">
    <label>Anthropic APIキー</label>
    <input type="password" id="anthropicKey" placeholder="sk-ant-..." />
  </div>
  <div class="field">
    <label>Google OAuth クライアントID</label>
    <input type="text" id="googleClientId" placeholder="xxxx.apps.googleusercontent.com" />
  </div>
  <div class="field">
    <label>スプレッドシートID</label>
    <input type="text" id="sheetId" value="18BFBKj1zmRWhxJ5Ywre0g7l0EDbybX_qnRzdUyRhXss" />
  </div>
  <button class="btn btn-secondary" onclick="saveConfig()">💾 設定を保存</button>
</div>

<div class="card">
  <h3>🔑 Google認証</h3>
  <div class="auth-status">
    <div class="dot" id="authDot"></div>
    <span id="authText">未接続</span>
  </div>
  <button class="btn btn-secondary" id="authBtn" onclick="doAuth()">Googleでログイン</button>
</div>

<div class="card">
  <h3>📸 商品写真</h3>
  <div class="upload-area" id="uploadArea">
    <input type="file" id="fileInput" accept="image/*" multiple onchange="onFileChange(event)">
    <div class="icon">📷</div>
    <p>写真を選ぶ / 撮影する</p>
    <small>複数枚OK</small>
  </div>
  <div class="preview-grid" id="previewGrid"></div>
  <button class="btn btn-primary" id="analyzeBtn" onclick="doAnalyze()" disabled>
    🔍 AIで解析してスプシに追加
  </button>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <p id="loadingMsg">解析中...</p>
</div>

<div class="card result" id="resultCard">
  <h3>✅ 解析結果（編集可）</h3>
  <div class="result-field"><label>商品名</label><input id="r_name" /></div>
  <div class="result-field"><label>ジャンル</label><input id="r_genre" /></div>
  <div class="result-field"><label>系統</label><input id="r_style" /></div>
  <div class="result-field"><label>ブランド</label><input id="r_brand" /></div>
  <div class="result-field"><label>出品価格</label><input id="r_price" type="number" placeholder="0" /></div>
  <div class="result-field"><label>状態</label><input id="r_condition" value="目立った傷や汚れなし" /></div>
  <br>
  <button class="btn btn-primary" onclick="doWrite()">📊 スプシに書き込む</button>
  <button class="btn btn-secondary" onclick="doReset()">↩ 別の商品</button>
</div>

<div class="toast" id="toast"></div>

  <script>
const PROXY = 'https://sedori-proxy.kawauso-movie124.workers.dev/';
let files = [];
let b64s = [];
let token = null;

function saveConfig() {
  const k = $('anthropicKey').value;
  const c = $('googleClientId').value;
  const s = $('sheetId').value;
  if (k) ls('ak', k);
  if (c) ls('gc', c);
  if (s) ls('si', s);
  toast('設定を保存しました', 'ok');
}

function loadConfig() {
  const k = ls('ak'); if (k) $('anthropicKey').value = k;
  const c = ls('gc'); if (c) $('googleClientId').value = c;
  const s = ls('si'); if (s) $('sheetId').value = s;
}

function doAuth() {
  const clientId = $('googleClientId').value || ls('gc');
  if (!clientId) { toast('クライアントIDを入力してください', 'err'); return; }
  const scope = 'https://www.googleapis.com/auth/spreadsheets';
  const uri = location.href.split('?')[0].split('#')[0];
  location.href = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${clientId}&redirect_uri=${encodeURIComponent(uri)}&response_type=token&scope=${encodeURIComponent(scope)}`;
}

function checkAuth() {
  const hash = location.hash;
  if (hash.includes('access_token')) {
    const p = new URLSearchParams(hash.slice(1));
    token = p.get('access_token');
    ls('at', token);
    history.replaceState(null, '', location.pathname);
    setAuth(true);
  } else {
    const t = ls('at');
    if (t) { token = t; setAuth(true); }
  }
}

function setAuth(on) {
  $('authDot').className = 'dot' + (on ? ' on' : '');
  $('authText').textContent = on ? '接続済み ✓' : '未接続';
  $('authBtn').textContent = on ? '再接続' : 'Googleでログイン';
}

function onFileChange(e) {
  const newFiles = Array.from(e.target.files);
  if (!newFiles.length) return;
  newFiles.forEach(f => addFile(f));
}

function addFile(f) {
  const idx = files.length;
  files.push(f);
  b64s.push(null);
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const max = 1000;
      let w = img.width, h = img.height;
      if (w > max || h > max) {
        if (w > h) { h = Math.round(h * max / w); w = max; }
        else { w = Math.round(w * max / h); h = max; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      b64s[idx] = canvas.toDataURL('image/jpeg', 0.75).split(',')[1];
      checkReady();
    };
    img.src = ev.target.result;
    const div = document.createElement('div');
    div.className = 'preview-item';
    div.id = 'prev_' + idx;
    div.innerHTML = `<img src="${ev.target.result}"><button class="remove-btn" onclick="removeFile(${idx})">✕</button>`;
    $('previewGrid').appendChild(div);
    $('uploadArea').classList.add('has-files');
  };
  reader.readAsDataURL(f);
}

function removeFile(idx) {
  files[idx] = null;
  b64s[idx] = null;
  const el = $('prev_' + idx);
  if (el) el.remove();
  checkReady();
}

function checkReady() {
  const ready = b64s.some(b => b !== null);
  $('analyzeBtn').disabled = !ready;
}

    async function doAnalyze() {
  const apiKey = $('anthropicKey').value || ls('ak');
  if (!apiKey) { toast('APIキーを入力してください', 'err'); return; }
  const validB64s = b64s.filter(b => b !== null);
  if (!validB64s.length) { toast('写真を選んでください', 'err'); return; }
  showLoading('AI解析中...');
  $('analyzeBtn').disabled = true;
  $('resultCard').classList.remove('active');
  try {
    const content = [
      ...validB64s.map(b => ({ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b } })),
      { type: 'text', text: 'この商品画像を分析してください。以下のJSONのみを返してください（説明文不要）：\n{"name":"メルカリで売れる商品名40文字以内","genre":"トップス/ボトムス/アウター/ワンピース/その他から選択","style":"韓国系/古着/ストリート/きれいめ/ナチュラル/モード/カジュアル/その他から選択","brand":"タグのブランド名（不明なら空文字）","condition":"目立った傷や汚れなし"}' }
    ];
    const res = await fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ apiKey, model: 'claude-sonnet-4-5', max_tokens: 500, messages: [{ role: 'user', content }] })
    });
    const data = await res.json();
    if (!data.content || !data.content[0]) throw new Error(JSON.stringify(data));
    const text = data.content[0].text;
    const json = JSON.parse(text.replace(/```json|```/g, '').trim());
    $('r_name').value = json.name || '';
    $('r_genre').value = json.genre || '';
    $('r_style').value = json.style || '';
    $('r_brand').value = json.brand || '';
    $('r_price').value = '';
    $('r_condition').value = json.condition || '目立った傷や汚れなし';
    $('resultCard').classList.add('active');
    $('resultCard').scrollIntoView({ behavior: 'smooth' });
  } catch (e) {
    toast('解析エラー: ' + e.message, 'err');
  } finally {
    hideLoading();
    $('analyzeBtn').disabled = false;
  }
}

async function doWrite() {
  if (!token) { toast('Googleにログインしてください', 'err'); return; }
  const sheetId = $('sheetId').value || ls('si');
  if (!sheetId) { toast('スプシIDを入力してください', 'err'); return; }
  showLoading('スプシに書き込み中...');
  const today = new Date();
  const yyyymm = today.getFullYear() + String(today.getMonth()+1).padStart(2,'0');
  const dateStr = `${today.getFullYear()}/${String(today.getMonth()+1).padStart(2,'0')}/${String(today.getDate()).padStart(2,'0')}`;
  try {
    const getRes = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/%E5%95%86%E5%93%81%E7%AE%A1%E7%90%86!A:A`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    const getData = await getRes.json();
    if (getData.error) throw new Error(getData.error.message);
    const nextRow = (getData.values ? getData.values.length : 1) + 1;
    const kanriNo = `${yyyymm}-${nextRow - 2}`;
    const row = [kanriNo, $('r_name').value, $('r_genre').value, $('r_style').value, $('r_brand').value, $('r_price').value || '', $('r_condition').value, '', '', '', '', '', '', '', dateStr];
    const writeRes = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/%E5%95%86%E5%93%81%E7%AE%A1%E7%90%86!A${nextRow}?valueInputOption=USER_ENTERED`,
      { method: 'PUT', headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ values: [row] }) }
    );
    const writeData = await writeRes.json();
    if (writeData.error) throw new Error(writeData.error.message);
    toast(`✓ ${kanriNo} をスプシに追加！`, 'ok');
    doReset();
  } catch (e) {
    toast('書き込みエラー: ' + e.message, 'err');
  } finally {
    hideLoading();
  }
}

function doReset() {
  files = []; b64s = [];
  $('previewGrid').innerHTML = '';
  $('fileInput').value = '';
  $('uploadArea').classList.remove('has-files');
  $('analyzeBtn').disabled = true;
  $('resultCard').classList.remove('active');
}

function $(id) { return document.getElementById(id); }
function ls(k, v) { if (v !== undefined) localStorage.setItem(k, v); else return localStorage.getItem(k); }
function showLoading(msg) { $('loadingMsg').textContent = msg; $('loading').classList.add('active'); }
function hideLoading() { $('loading').classList.remove('active'); }
function toast(msg, type) {
  const t = $('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 3000);
}

loadConfig();
checkAuth();
</script>
</body>
</html>
